# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
# WHY: single source of truth for advisory ignores (parity-derived to .cargo/audit.toml + osv-scanner.toml). Empty = no suppressions.
ignore = []
# NOTE: no ignores. A future suppression lands here as [[advisories.ignore]]
# with id + reason + review-by, per SUPPLY-CHAIN.md (kanon crates/basanos/standards).

[licenses]
# WHY: AGPL-3.0-only covers sphragis itself; the rest cover the RustCrypto /
# dalek / blake3 dependency tree.
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# WHY: rand_core 0.6 (x25519-dalek call sites) and 0.10 (ml-kem transitive)
# coexist by design; see DECISION.md section 6.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
