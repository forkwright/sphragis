# NOTE: the dependency audit (cargo deny + cargo audit + osv-scanner) runs in
# security.yml per-PR and daily; duplicating it here would double CI spend on
# required checks.
#
# WHY(kanon#2522): the standalone gate-attestation job this file used to carry
# (hard-fail trailer verify, no fallback build, no branch-protection
# requirement) is removed -- gate-attestation.yml's adoption of
# forkwright/kanon's hybrid-gate.yml now does the same trailer check
# correctly, with a real fmt/check/clippy/nextest fallback build for
# trailer-less PRs instead of an unconditional hard-fail. Leaving this job in
# place would have kept showing a permanently-failing, non-required
# "gate-attestation" check on every trailer-less PR -- a misleading duplicate
# signal, not a real gate.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: cargo fmt check
        run: cargo fmt --all -- --check

  check:
    name: cargo check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo check (default)
        run: cargo check --all-targets
      - name: cargo check (preview-pq)
        run: cargo check --all-targets --features preview-pq

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: clippy (default)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy (preview-pq)
        run: cargo clippy --all-targets --features preview-pq -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test (default — inert build check)
        run: cargo test
      - name: cargo test (preview-pq — KAT + round-trip + negatives)
        run: cargo test --features preview-pq
