# WHY(kanon#2522): replaces the org-default trailer-only reusable
# (forkwright/.github/.github/workflows/gate-attestation.yml@5be130b, job id
# `gate`, required context "gate / gate-attestation") with the kanon-owned
# hybrid gate. A trailer-stamped PR still takes the fast path; a
# trailer-less PR now falls through to a REAL fmt/check/clippy/nextest
# build on GH-hosted ubuntu-latest, which the old org-default never ran.
#
# WHY ai_attribution_check/docs_only_exemption are NOT set below
# (UNVERIFIED-strip, kanon#2522 A4 follow-up): forkwright/kanon main
# (hybrid-gate.yml) does not yet declare these workflow_call inputs as of
# this adoption -- passing them would make GH Actions reject the unknown
# `with:` keys at trigger time. Re-add both once that kanon-side extension
# is actually on kanon's main. No inline ai-attribution logic exists
# anywhere in this repo's workflows today, so this remains a net-new check
# once it lands, not the retirement of an existing pattern.
#
# WHY these with: values (cite): .github/workflows/ci.yml (fmt/check/clippy/
# test jobs) + .kanon-ci.toml (forge pipeline, same commands +jobs 8 which we
# drop — GH-hosted ubuntu-latest runners are already core-capped, the 8-job
# ceiling in .kanon-ci.toml exists only to protect menos from concurrent-
# build OOM per that file's own WHY comment, not applicable here).
#
# DISCREPANCY: sphragis is a single [package], not a [workspace] — no
# --workspace flag on any stage. ci.yml runs check/clippy/test TWICE per PR
# (default features, then --features preview-pq); hybrid-gate.yml's inputs
# are single-string, so both feature-set runs are chained with `&&` below to
# preserve full ci.yml coverage in one command.
#
# UNVERIFIED: sphragis has NEVER run cargo-nextest — both ci.yml and
# .kanon-ci.toml use plain `cargo test`. nextest_cmd below substitutes
# `cargo nextest run` per fleet convention; unconfirmed until full-gate-build
# is watched green on the adoption PR (nextest discovering the same tests/
# integration suite + src/ unit tests as `cargo test` did). Because nextest
# does not run doctests, doctest_cmd is added below (chained per feature
# set) to keep the doctest coverage `cargo test --features preview-pq`
# implicitly had — this is a net-new explicit stage, not a 1:1 mirror.
#
# UNVERIFIED: no rust-toolchain.toml/file exists in this repo (confirmed) —
# rust_toolchain is set explicitly below rather than left "" (auto-detect),
# per the input's own contract. Value picked to match ci.yml's
# dtolnay/rust-toolchain@<sha> pin on the action's "stable" branch.
#
# DOUBLE-BUILD-COST FLAG: ci.yml (fmt/check/clippy/test, on: pull_request +
# push:main) is NOT currently in branch-protection required_status_checks
# (only "gate / gate-attestation", "cargo deny", "cargo audit" are) — so this
# is a CI-MINUTES duplication, not a merge-latency one: once full-gate-build
# also runs these commands for trailer-less PRs, every PR still pays ci.yml's
# build cost a second time regardless of trailer state. Recommend leaving
# ci.yml as-is (informational, non-required) unless CI-minute spend becomes
# a concern.
#
# NOTE: sphragis#10 (toolchain-pin PR) independently fails `cargo audit`
# today, unrelated to this gate migration — needs its own fix regardless.
name: Gate Attestation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# WHY no concurrency: block here: hybrid-gate.yml itself already declares
# `concurrency: group: ${{ github.workflow }}-${{ github.ref }}` and its own
# comment states callers must NOT also set a concurrency group with that
# same key, or the shared group self-cancels. sphragis's PRIOR file set this
# exact key -- dropped here, not carried forward, for that reason.

jobs:
  gate:
    uses: forkwright/kanon/.github/workflows/hybrid-gate.yml@main
    with:
      rust_toolchain: "stable"
      fmt_cmd: "cargo fmt --all -- --check"
      check_cmd: "cargo check --all-targets && cargo check --all-targets --features preview-pq"
      clippy_cmd: "cargo clippy --all-targets -- -D warnings && cargo clippy --all-targets --features preview-pq -- -D warnings"
      nextest_cmd: "cargo nextest run && cargo nextest run --features preview-pq"
      doctest_cmd: "cargo test --doc && cargo test --doc --features preview-pq"
      system_packages: ""
      needs_fleet_repo_token: false
      rust_cache_key: "gate-attestation"
    secrets: inherit
